; for xml and html reports, set the following enviromental variables
; mypy_args = "--html-report reports/mypy_report"
; pytest_args = "--junitxml=reports/junit-{env:OS:UNKNOWN_OS}-{envname}.xml --junit-prefix={env:OS:UNKNOWN_OS}  --basetemp={envtmpdir}"
; sphinx_args = "-W -b html -d {envtmpdir}/doctrees source  {envtmpdir}/html"
[tox]
envlist = py310, py311, py312, py313, py314
isolated_build = true
min_version = 4.20

[tool:pytest]
testpath = tests
addopts = --verbose

[testenv]
dependency_groups = test
commands=
    pytest --basetemp={envtmpdir} {env:pytest_args:} {posargs}
    behave --format=progress3 {posargs}


[testenv:docs]
changedir=docs
dependency_groups = docs
commands=
    sphinx-build {env:sphinx_args:-W -b html -d {envtmpdir}/doctrees source  {distdir}/html}

[testenv:mypy]
dependency_groups = type-checking
skip_install=True
ignore_outcome = true
setenv = MYPY_CACHE_DIR = {temp_dir}/.mypy_cache
commands = mypy {posargs: src/hathi_validate}

[testenv:flake8]
description = check the code style
dependency_groups = code-style
skip_install=True
ignore_outcome = true
commands = flake8 {posargs: src/hathi_validate}


[testenv:pylint]
description = check the code style
dependency_groups = lint
skip_install = true
ignore_outcome = true
commands =  pylint {posargs: src/hathi_validate} --disable import-error

[testenv:pydocstyle]
skip_install = true
ignore_outcome = true
dependency_groups = code-style
commands =
    pydocstyle {posargs: {toxinidir}/src/hathi_validate}

[testenv:bandit]
skip_install = true
dependency_groups = security
commands =
    bandit {posargs: --recursive {toxinidir}/src/hathi_validate}
